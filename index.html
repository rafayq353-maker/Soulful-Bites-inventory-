<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soulful Bites Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; font-family: sans-serif; }
        .gold-border { border: 1px solid #fbbf24; }
        .category-header { background: #1e293b; border-left: 4px solid #fbbf24; padding: 8px; margin-top: 20px; font-weight: bold; color: #fbbf24; }
        .item-card { background: #1e293b; padding: 12px; border-radius: 8px; margin-bottom: 10px; }
        .btn-action { padding: 6px; border-radius: 4px; font-size: 12px; font-weight: bold; transition: 0.2s; }
        .btn-purchase { background: #15803d; }
        .btn-use { background: #1d4ed8; }
        .btn-closing { background: #b91c1c; }
    </script>
</head>
<body class="p-4 pb-20">

    <header class="text-center mb-6">
        <h1 class="text-3xl font-extrabold text-yellow-500">SOULFUL BITES</h1>
        <p class="text-xs text-gray-400 uppercase tracking-widest">Inventory Management Ecosystem</p>
    </header>

    <div class="flex sticky top-0 bg-slate-900 z-10 justify-around mb-6 border-b border-slate-700 py-2">
        <button onclick="renderInventory()" class="text-yellow-500 font-bold">STORE</button>
        <button onclick="showLowStock()" class="text-gray-400">LOW STOCK</button>
        <button onclick="showHistory()" class="text-gray-400">HISTORY</button>
    </div>

    <div class="mb-4">
        <input type="text" id="searchInput" placeholder="Search product..." onkeyup="searchItems()" class="w-full p-3 bg-slate-800 rounded-lg border border-slate-600 outline-none focus:border-yellow-500">
    </div>

    <div id="main-content">
        </div>

    <script>
        const inventoryData = [
            // MEAT & POULTRY
            { id: 1, cat: "MEAT & POULTRY", name: "Mutton", qty: 2.5, unit: "kg" },
            { id: 2, cat: "MEAT & POULTRY", name: "Chicken", qty: 8.6, unit: "kg" },
            { id: 3, cat: "MEAT & POULTRY", name: "Fish", qty: 0.6, unit: "kg" },
            { id: 4, cat: "MEAT & POULTRY", name: "Prawn", qty: 0, unit: "kg" },

            // OILS & FATS
            { id: 5, cat: "OILS & FATS", name: "Cooking Oil", qty: 26, unit: "Liter" },
            { id: 6, cat: "OILS & FATS", name: "Ghee", qty: 3, unit: "kg" },
            { id: 7, cat: "OILS & FATS", name: "Butter", qty: 0.76, unit: "kg" },

            // GRAINS & FLOUR
            { id: 8, cat: "GRAINS & FLOUR", name: "Rice Sela", qty: 25, unit: "kg" },
            { id: 9, cat: "GRAINS & FLOUR", name: "Rice Basmati", qty: 3, unit: "kg" },
            { id: 10, cat: "GRAINS & FLOUR", name: "Fine Atta", qty: 10, unit: "kg" },
            { id: 11, cat: "GRAINS & FLOUR", name: "Maida", qty: 12.5, unit: "kg" },
            { id: 12, cat: "GRAINS & FLOUR", name: "Besan", qty: 0.725, unit: "kg" },

            // SPICES (MASALE)
            { id: 13, cat: "SPICES", name: "National Salt", qty: 15, unit: "pkt" },
            { id: 14, cat: "SPICES", name: "Lahori Namak", qty: 3.3, unit: "kg" },
            { id: 15, cat: "SPICES", name: "Crush Chili", qty: 2.7, unit: "kg" },
            { id: 16, cat: "SPICES", name: "Lal Mirch Pow", qty: 0.7, unit: "kg" },
            { id: 17, cat: "SPICES", name: "Haldi", qty: 1, unit: "kg" },
            { id: 18, cat: "SPICES", name: "Black Pepper", qty: 1.7, unit: "kg" },
            { id: 19, cat: "SPICES", name: "Tez Patta", qty: 0.8, unit: "kg" },
            { id: 20, cat: "SPICES", name: "Long (Cloves)", qty: 1.45, unit: "kg" },

            // DRINKS
            { id: 21, cat: "DRINKS", name: "Pepsi Cans", qty: 25, unit: "pcs" },
            { id: 22, cat: "DRINKS", name: "7up Cans", qty: 80, unit: "pcs" },
            { id: 23, cat: "DRINKS", name: "Sting", qty: 33, unit: "pcs" },
            { id: 24, cat: "DRINKS", name: "Next Cola Red", qty: 12, unit: "pcs" },
            { id: 25, cat: "DRINKS", name: "Aquafina Water", qty: 27, unit: "b" },

            // PACKAGING
            { id: 26, cat: "PACKAGING", name: "Tissue Roll", qty: 92, unit: "pcs" },
            { id: 27, cat: "PACKAGING", name: "Tissue Box", qty: 71, unit: "pcs" },
            { id: 28, cat: "PACKAGING", name: "Aluminum Foil", qty: 1, unit: "pkt" }
            // Note: Baki items bhi isi tarah category mein add honge
        ];

        function renderInventory() {
            const container = document.getElementById('main-content');
            container.innerHTML = "";
            let currentCat = "";

            inventoryData.forEach(item => {
                if (item.cat !== currentCat) {
                    currentCat = item.cat;
                    container.innerHTML += `<div class="category-header">${currentCat}</div>`;
                }

                container.innerHTML += `
                    <div class="item-card gold-border">
                        <div class="flex justify-between items-center mb-3">
                            <span class="font-bold text-lg">${item.name}</span>
                            <span class="text-yellow-400 font-mono text-xl">${item.qty} ${item.unit}</span>
                        </div>
                        <div class="flex gap-2">
                            <input type="number" id="input-${item.id}" placeholder="Qty" class="w-1/4 p-1 bg-slate-900 rounded border border-slate-700 text-center">
                            <button onclick="action(${item.id}, 'purchase')" class="btn-action btn-purchase flex-1">PURCHASE</button>
                            <button onclick="action(${item.id}, 'use')" class="btn-action btn-use flex-1">USE</button>
                            <button onclick="action(${item.id}, 'closing')" class="btn-action btn-closing flex-1 text-[10px]">CLOSING</button>
                        </div>
                    </div>
                `;
            });
        }

        function action(id, type) {
            const val = parseFloat(document.getElementById(`input-${id}`).value);
            if (!val || val <= 0) return alert("Please enter valid quantity");
            
            let item = inventoryData.find(i => i.id === id);
            
            if (type === 'purchase') item.qty += val;
            if (type === 'use') item.qty -= val;
            if (type === 'closing') {
                let used = item.qty - val;
                alert(`Auto-calculation: ${used} ${item.unit} added to daily use.`);
                item.qty = val;
            }
            
            document.getElementById(`input-${id}`).value = "";
            renderInventory();
        }

        renderInventory();
    </script>
</body>
  </html>
